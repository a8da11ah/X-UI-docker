services:
  x-ui-pro:
    build: .
    container_name: x-ui-pro
    hostname: x-ui-pro
    # systemd needs real control over cgroups/namespaces to manage the
    # nginx/x-ui/v2raya/warp-plus/tor/cron services the installer creates.
    privileged: true
    cgroup: host
    # Don't rely on Docker's auto-detected host DNS: if the host uses
    # systemd-resolved, /etc/resolv.conf there often points at 127.0.0.53,
    # a loopback address that's unreachable from inside the container's own
    # network namespace and causes "Temporary failure resolving" errors.
    dns:
      - 1.1.1.1
      - 8.8.8.8
    tmpfs:
      - /run
      - /run/lock
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
      # systemd (PID 1) does NOT forward its own process environment to the
      # units it spawns, so env_file below is not visible to the installer
      # service - it reads config from this bind-mounted file instead via
      # EnvironmentFile= in x-ui-pro-install.service.
      - ./.env:/etc/x-ui-pro.env:ro
      - x-ui-etc:/etc/x-ui
      - x-ui-pro-state:/etc/x-ui-pro
      - nginx-etc:/etc/nginx
      - letsencrypt:/etc/letsencrypt
      - backups:/var/backups
      - tor-etc:/etc/tor
      - cron-spool:/var/spool/cron
    env_file:
      - .env
    ports:
      - "80:80"
      - "443:443"
      - "2017:2017"   # v2rayA web UI (direct access; nginx also proxies it over 443)
      - "9050:9050"   # Tor SOCKS5 (only used if TOR_COUNTRY is set)
      # The X-UI panel itself is NOT published directly - nginx reverse-proxies
      # it over the 443 port above at the random path printed in the install
      # log (see README's "Finding your panel URL and credentials").
    restart: unless-stopped

volumes:
  x-ui-etc:
  x-ui-pro-state:
  nginx-etc:
  letsencrypt:
  backups:
  tor-etc:
  cron-spool:
